<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle in deep navy -->
  <circle cx="16" cy="16" r="16" fill="#111A22"/>
  
  <!-- Microphone body -->
