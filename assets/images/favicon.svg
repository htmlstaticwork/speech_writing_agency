  <!-- Microphone stand arc -->
  <path d="M9 17 Q9 24 16 24 Q23 24 23 17" 
        fill="none" 
        stroke="#C5A059" 
        stroke-width="2" 
        stroke-linecap="round"/>
  
  <!-- Stand pole -->
